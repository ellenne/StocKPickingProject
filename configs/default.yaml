# ─────────────────────────────────────────────────────────────
#  configs/default.yaml  –  StockPickingML default configuration
# ─────────────────────────────────────────────────────────────

# ── Universe ────────────────────────────────────────────────
universe:
  source: "sp500_wikipedia"          # sp500_wikipedia | csv | custom
  # Path to a CSV with columns [date, ticker] for historical membership.
  # If null the project uses the current S&P 500 list (survivorship-biased).
  historical_constituents_csv: null
  survivorship_bias_warning: true

# ── Data ────────────────────────────────────────────────────
data:
  start_date: "2010-01-01"           # history start (earlier → longer backtest)
  end_date: null                     # null → today
  rebalance_day: "WED"               # WED = Wednesday per paper
  price_source: "yfinance"           # yfinance only for now
  fundamentals_source: "yfinance"    # yfinance | fmp | alphavantage
  fundamentals_lag_months: 3         # paper: 3-month lag to avoid lookahead
  cache_dir: "data/raw"
  processed_dir: "data/processed"
  max_missing_pct: 0.3               # drop tickers with >30 % missing price weeks

# ── Feature engineering ─────────────────────────────────────
features:
  winsorize: true
  winsorize_pct: 0.01                # clip top/bottom 1 %
  # Which feature groups to compute
  technical: true
  fundamental: true
  sector_dummies: true
  # Forward-fill limit (weeks) before cross-sectional median imputation
  ffill_limit: 52

# ── Target ──────────────────────────────────────────────────
target:
  label_strict_gt: true              # True → label=1 iff return > median (paper default)

# ── Rolling training ────────────────────────────────────────
rolling:
  train_years: 3                     # paper: 3 years = 156 weeks
  test_years: 1                      # retrain every year
  val_fraction: 0.20                 # last 20 % of training window = validation
  min_train_weeks: 104               # safety floor (2 years)
  seed: 42

# ── Models ──────────────────────────────────────────────────
models:
  enabled:
    - ridge
    - lasso
    - elasticnet
    - pca_logistic
    - random_forest
    - xgboost
    - dnn
    - lstm
    - ensemble

  ridge:
    C_grid: [1e-4, 1e-3, 1e-2, 0.1, 1, 10, 100, 1000, 1e4]
    cv_folds: 5

  lasso:
    C_grid: [1e-4, 1e-3, 1e-2, 0.1, 1, 10, 100, 1000, 1e4]
    cv_folds: 5

  elasticnet:
    C_grid: [1e-4, 1e-3, 1e-2, 0.1, 1, 10, 100, 1000, 1e4]
    l1_ratio_grid: [0.05, 0.1, 0.2, 0.3, 0.5, 0.7, 0.8, 0.9, 0.95, 1.0]
    cv_folds: 5

  pca_logistic:
    max_components: null             # null → use elbow (90 % variance)
    cv_folds: 5

  random_forest:
    n_estimators_grid: [100, 250, 500]
    max_depth_grid: [3, 5, 7, 10]
    min_samples_leaf_grid: [1, 3, 5]
    cv_folds: 5
    n_jobs: -1

  xgboost:
    n_estimators: 1000
    early_stopping_rounds: 50
    max_depth_grid: [3, 5, 7]
    min_child_weight_grid: [1, 3, 5]
    eta_grid: [0.01, 0.05, 0.1]
    colsample_bytree_grid: [0.7, 0.9, 1.0]
    gamma_grid: [0, 0.01, 0.1]
    subsample: 0.5
    cv_folds: 5

  dnn:
    hidden_layers: [20, 10, 5]
    activation: "relu"
    epochs: 100
    early_stopping_patience: 10
    learning_rate: 0.001
    l1_reg: 0.0001
    batch_norm: true
    dropout: 0.0
    batch_size: 512
    grad_clip: 1.0          # max gradient norm (0 = disabled)
    log_every_n_epochs: 5   # INFO-level progress frequency
    seed: 42

  lstm:
    hidden_units: 30
    seq_len: 8                       # weeks of history fed to LSTM
    epochs: 100
    early_stopping_patience: 15
    learning_rate: 0.001
    weight_decay: 0.0001
    l1_reg: 0.0001
    dropout: 0.2
    batch_size: 256
    grad_clip: 1.0
    log_every_n_epochs: 5
    seed: 42

# ── Portfolio construction ───────────────────────────────────
portfolio:
  top_n: 50                          # default N=50 (paper finding)
  top_n_alternatives: [100, 200]     # evaluated in backtest report
  equal_weight: true

# ── Transaction costs ────────────────────────────────────────
transaction_costs:
  enabled: true
  one_way_bps: 5                     # basis points per one-way trade

# ── Outputs ─────────────────────────────────────────────────
outputs:
  dir: "outputs"
  save_predictions: true
  save_holdings: true
  save_charts: true
  chart_format: "png"                # png | pdf | svg
