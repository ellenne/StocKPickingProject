# configs/fast.yaml  –  Quick-run config (Phase-1 results in ~30-60 min)
# Overrides default.yaml for a faster first run.

data:
  start_date: "2015-01-01"    # ~10 years of data
  end_date: null

models:
  enabled:
    - ridge
    - lasso
    - elasticnet
    - pca_logistic
    - random_forest
    - xgboost
    - dnn
    - lstm
    - ensemble

  # Tighter CV grids to keep backtest runtime manageable
  ridge:
    C_grid: [0.001, 0.01, 0.1, 1, 10]
    cv_folds: 3

  lasso:
    C_grid: [0.001, 0.01, 0.1, 1, 10]
    cv_folds: 3

  elasticnet:
    C_grid: [0.01, 0.1, 1]
    l1_ratio_grid: [0.3, 0.7, 0.9]
    cv_folds: 3

  pca_logistic:
    cv_folds: 3

  random_forest:
    n_estimators_grid: [100, 200]
    max_depth_grid: [3, 5]
    min_samples_leaf_grid: [1, 3]
    cv_folds: 3

  xgboost:
    n_estimators: 300
    early_stopping_rounds: 20
    max_depth_grid: [3, 5]
    min_child_weight_grid: [1]
    eta_grid: [0.1]
    colsample_bytree_grid: [0.8]
    gamma_grid: [0]
    cv_folds: 3

  # DNN: paper architecture (Section 3.5)
  # 3 hidden layers 20-10-5, BatchNorm, RMSprop
  # Fixes vs original run:
  #   - l1_reg reduced 10x (was 0.0001 → bottleneck at 5 nodes was killing gradient signal)
  #   - lr increased 3x (was 0.001 → too slow to escape near-random baseline)
  #   - weight_decay added (L2 via optimizer, matches LSTM dual-reg scheme)
  #   - dropout 0.1 (light regularisation without blocking learning)
  #   - batch_size halved (more gradient updates per epoch)
  #   - patience increased 10→20 (noisy financial loss landscape needs more time)
  #   - lr_scheduler ReduceLROnPlateau (halves LR when val plateaus)
  dnn:
    hidden_layers: [20, 10, 5]
    epochs: 100
    early_stopping_patience: 20
    learning_rate: 0.003
    l1_reg: 0.00001
    weight_decay: 0.0001
    batch_norm: true
    dropout: 0.1
    batch_size: 256
    grad_clip: 1.0
    lr_scheduler: true
    log_every_n_epochs: 10
    diag_every_n_epochs: 20
    seed: 42

  # LSTM: paper architecture (Section 3.6)
  # 1 hidden layer, 30 cells, seq_len=8 weeks
  # Sequences built per-ticker to avoid cross-stock contamination.
  # weight_decay provides L2 reg equivalent to DNN's l1_reg.
  # Dropout on FC layer prevents rapid overfitting on financial noise.
  lstm:
    hidden_units: 30
    seq_len: 8
    epochs: 100
    early_stopping_patience: 15    # extra patience; financial data is noisy
    learning_rate: 0.001
    weight_decay: 0.0001           # L2 regularisation via RMSprop weight_decay
    l1_reg: 0.0001                 # explicit L1 on weight tensors (same scale as DNN)
    dropout: 0.2                   # regularise the LSTM→FC connection
    batch_size: 256
    grad_clip: 1.0
    log_every_n_epochs: 10
    seed: 42

rolling:
  train_years: 3
  test_years: 1
  val_fraction: 0.20
  seed: 42
